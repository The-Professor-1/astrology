{% extends 'base.html' %}
{% block title %}Sign Description{% endblock title %}
{% block body %}
<div class="calc-page">
    <div class="card" style="text-align: center;">
        <h1 style="font-size: 1.75rem; color: var(--accent-gold); margin-bottom: 1.5rem;">{{ sign }}</h1>
        <div style="color: var(--text-muted); line-height: 1.8; text-align: left;">
            {{ description }}
        </div>
        <a href="{% url 'calculate' %}" class="btn btn-outline" style="margin-top: 2rem;">← Back to Calculator</a>
    </div>
</div>
{% endblock body %}
